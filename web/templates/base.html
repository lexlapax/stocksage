<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}StockSage{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">StockSage</a>
      <nav class="nav" aria-label="Primary navigation">
        <a class="nav-link {% if active_nav == 'research' %}active{% endif %}" href="/">Research</a>
        <a class="nav-link {% if active_nav == 'workspace' %}active{% endif %}" href="/workspace">My Workspace</a>
      </nav>
      <div class="top-actions">
        <span class="user-pill">{{ current_user.username|e }}</span>
        <a class="button primary" href="#new-analysis">+ Analyze</a>
      </div>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <section id="new-analysis" class="modal-anchor" aria-label="New analysis form">
      <div class="modal-shell">
        <div class="modal-header">
          <h2>Analyze a stock</h2>
          <a class="icon-link" href="#" aria-label="Close">×</a>
        </div>
        <form id="analysis-form" class="form-grid" method="post" action="/analysis">
          <label>
            <span>Ticker</span>
            <input
              id="analysis-ticker"
              name="ticker"
              placeholder="AAPL"
              maxlength="16"
              required
              hx-get="/analysis/reuse-note"
              hx-trigger="keyup changed delay:400ms"
              hx-target="#reuse-note"
              hx-include="#analysis-form"
              hx-swap="outerHTML"
            >
          </label>
          <label>
            <span>Analysis date</span>
            <input
              id="analysis-date"
              name="trade_date"
              type="date"
              value="{{ today }}"
              hx-get="/analysis/reuse-note"
              hx-trigger="change"
              hx-target="#reuse-note"
              hx-include="#analysis-form"
              hx-swap="outerHTML"
            >
          </label>
          <label>
            <span>Run as</span>
            <input name="user" value="{{ current_user.username|e }}">
          </label>
          <div id="reuse-note" class="form-note note-idle" aria-live="polite">
            Enter a ticker and date to check for existing reports.
          </div>
          <div class="form-actions">
            <button class="button primary" type="submit">Submit</button>
            <a class="button subtle" href="#">Cancel</a>
          </div>
        </form>
      </div>
    </section>
    {% block scripts %}{% endblock %}
  </body>
</html>
